website:
  # title: "Ligea Alexander"
  site-url: ligea.alexander.com 
  favicon: favicon.ico
  image: images/italy.jpeg
  page-navigation: true
  search: 
    location: navbar
    type: overlay
  navbar:
    left:
      - file: index.qmd
        text: "Ligea Alexander"
      - text: "Work"
        menu:
          - file: projects/all-projects.qmd
          - file: projects/data-viz/all.qmd
          - file: projects/swear-youre-not-stupid/index.qmd 
         
    right:
      - file: about.qmd
        text: "About" 
      - icon: github
        href: https://github.com/ligea-alexander
      - text: "Tableau Public"
        icon: fa-brands fa-tableau
        href: https://public.tableau.com/app/profile/ligea.alexander
      - icon: linkedin
        href: https://linkedin.com/in/ligea-alexander
      - icon: medium
        href: https://medium.com/@ligea.alex
        
format:
  html:
    theme:
      light: 
        - cosmo
        - custom-light.scss
      dark: 
        - darkly
        - custom-dark.scss
    include-css: 
      - styles.css
    include-after-body: projects/footer.qmd
      
includes:
    in-header: 
      <link rel="icon" href="favicon.ico" type="image/x-icon">
      <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">


      